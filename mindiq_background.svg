<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="20%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#1a2744" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#2d1b4e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f1c"/>
      <stop offset="50%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d9c0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>

  <!-- subtle neural-net style nodes and connecting lines -->
  <g stroke="#3d4a6b" stroke-width="1" opacity="0.35">
    <line x1="150" y1="120" x2="420" y2="260"/>
    <line x1="420" y1="260" x2="300" y2="480"/>
    <line x1="420" y1="260" x2="680" y2="180"/>
    <line x1="680" y1="180" x2="900" y2="340"/>
    <line x1="300" y1="480" x2="580" y2="600"/>
    <line x1="580" y1="600" x2="900" y2="340"/>
    <line x1="1300" y1="200" x2="1550" y2="360"/>
    <line x1="1550" y1="360" x2="1750" y2="220"/>
    <line x1="1550" y1="360" x2="1450" y2="600"/>
    <line x1="1450" y1="600" x2="1700" y2="720"/>
    <line x1="1200" y1="800" x2="1450" y2="600"/>
    <line x1="200" y1="850" x2="450" y2="750"/>
    <line x1="450" y1="750" x2="700" y2="900"/>
  </g>
  <g fill="#7c5cff" opacity="0.55">
    <circle cx="150" cy="120" r="4"/>
    <circle cx="420" cy="260" r="5"/>
    <circle cx="300" cy="480" r="3.5"/>
    <circle cx="680" cy="180" r="4"/>
    <circle cx="900" cy="340" r="5"/>
    <circle cx="580" cy="600" r="3.5"/>
  </g>
  <g fill="#00d9c0" opacity="0.5">
    <circle cx="1300" cy="200" r="4"/>
    <circle cx="1550" cy="360" r="5"/>
    <circle cx="1750" cy="220" r="3.5"/>
    <circle cx="1450" cy="600" r="4"/>
    <circle cx="1700" cy="720" r="3.5"/>
    <circle cx="1200" cy="800" r="4"/>
  </g>
  <g fill="#7c5cff" opacity="0.4">
    <circle cx="200" cy="850" r="3.5"/>
    <circle cx="450" cy="750" r="4"/>
    <circle cx="700" cy="900" r="3"/>
  </g>

  <!-- faint horizontal accent lines, dashboard feel -->
  <rect x="0" y="0" width="1920" height="2" fill="url(#accentLine)"/>
  <rect x="0" y="1078" width="1920" height="2" fill="url(#accentLine)"/>

  <!-- soft vignette -->
  <rect width="1920" height="1080" fill="black" opacity="0.15"/>
</svg>
